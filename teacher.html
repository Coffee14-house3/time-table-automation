<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Teacher Login / Input</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;margin:0;padding:20px}
    .card{max-width:820px;margin:24px auto;padding:20px;background:white;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    h1{color:#333}label{display:block;margin:12px 0 6px;color:#333;font-weight:600}
    input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
    .row{display:flex;gap:12px}
    .half{flex:1}
    button{margin-top:16px;padding:10px 16px;border:0;border-radius:6px;background:#667eea;color:#fff;font-weight:700;cursor:pointer}
    .note{font-size:0.9rem;color:#666;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Teacher Submission</h1>
    <p class="note">Fill your teaching details </p>

    <form id="teacherForm">
      <label for="name">Full name</label>
      <input id="name" name="name" placeholder="e.g. Dr. A. Kumar" required />

      <label for="email">Email (optional)</label>
      <input id="email" name="email" type="email" placeholder="you@school.edu" />

      <div class="row">
        <div class="half">
          <label for="classType">Class type</label>
          <select id="classType" required>
            <option value="UG">UG</option>
            <option value="PG">PG</option>
          </select>
        </div>

        <div class="half">
          <label for="section">Section</label>
          <select id="section" required>
            <option value="BCA_A">BCA A</option>
            <option value="BCA_B">BCA B</option>
            <option value="BCA_C">BCA C</option>
            <option value="MCA_A">MCA A</option>
            <option value="MCA_B">MCA B</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="half">
          <label for="year">Year</label>
          <select id="year" required>
            <option value="Y1">1</option>
            <option value="Y2">2</option>
            <option value="Y3">3</option>
          </select>
        </div>

        <div class="half">
          <label for="semester">Semester</label>
          <select id="semester" required>
            <option value="ODD">Odd</option>
            <option value="EVEN">Even</option>
          </select>
        </div>
      </div>

      <div class="row" id="specRow" style="display:none;margin-top:8px">
        <div class="half">
          <label for="specialization">Specialization (3rd year UG)</label>
          <select id="specialization">
            <option value="">-- Select specialization --</option>
            <option value="CYBER_SECURITY">Cyber Security</option>
            <option value="MULTIMEDIA">Multimedia</option>
            <option value="GENERAL">General</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="half">
          <label for="hours">Hours per week</label>
          <input id="hours" type="number" min="1" max="40" value="10" required />
        </div>

        <div class="half">
          <label for="labCap">Can take lab classes?</label>
          <select id="labCap">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
      </div>

      <label for="subjects">Select subjects you can teach (hold Ctrl/Cmd for multi-select)</label>
      <select id="subjects" multiple size="6" required></select>

      <label>Preferred days (optional)</label>
      <div id="daysPrefs" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
      </div>

      <button type="submit">Submit</button>
      <p class="note">Data is stored locally in your browser (localStorage). Admin can export it.</p>
    </form>
  </div>

  <script>
    const SUBJECTS_KEY = 'curriculum_subjects';

    function safeGetJSON(key, defaultVal) {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null || raw === undefined) return defaultVal;
        return JSON.parse(raw);
      } catch (err) {
        console.error('safeGetJSON parse error for', key, err);
        try { localStorage.setItem(key, JSON.stringify(defaultVal)); } catch (e) { }
        return defaultVal;
      }
    }

    function safeGetJSONNoWrite(key, defaultVal) {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null || raw === undefined) return defaultVal;
        return JSON.parse(raw);
      } catch (err) {
        console.error('safeGetJSONNoWrite parse error for', key, err);
        return defaultVal;
      }
    }

    function initializeSubjects() {
      const sections = {
        'ODD': ['BCA_A', 'BCA_B', 'BCA_C', 'MCA_A', 'MCA_B'],
        'EVEN': ['BCA_A', 'BCA_B', 'BCA_C', 'MCA_A', 'MCA_B']
      };
      const years = ['Y1','Y2','Y3'];

      const defaults = {};
      Object.keys(sections).forEach(sem => {
        sections[sem].forEach(sec => {
          years.forEach(y => {
            const key = sem + '_' + sec + '_' + y;
            if (sec.startsWith('MCA')) {
              defaults[key] = ['Advanced Algorithms','Machine Learning','Distributed Systems','Artificial Intelligence'];
            } else {
              if (y === 'Y1') {
                if (sem === 'ODD') {
                  defaults[key] = ['Statistics','Accounts','English','C','C++','Computer Concepts'];
                } else {
                  defaults[key] = ['English','Communication','Web Designing','Python','Problem Solving Techniques'];
                }
              } else if (y === 'Y2') {
                if (sem === 'ODD') {
                  defaults[key] = ['Java','Advanced Python','Data Structure','Computer Networks','Nptel Course 1'];
                } else {
                  defaults[key] = ['PHP','Enterprise Resource Management','Advanced Computer Networks','Database Management','Nptel Course 2'];
                }
              } else {
                // specialization defaults for third year
                const spec = key.split('_').pop();
                if (spec === 'CYBER_SECURITY') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Networking tools','Advanced Networking','Hacking Basics','Operating Systems','Secure Programming'];
                  } else {
                    defaults[key] = ['Cryptography','Web Security','Cyber Laws & Ethics','Ethical Hacking','Digital Forensics'];
                  }
                } else if (spec === 'MULTIMEDIA') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Introduction to Multimedia','Graphic Design Fundamentals','Digital Image Processing','Web Design & Development','2D Animation'];
                  } else {
                    defaults[key] = ['3D Animation Basics','Audio & Video Editing','UI/UX Design','Multimedia Systems','Digital Marketing Basics'];
                  }
                } else if (spec === 'GENERAL') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Web Technology','Computer Graphics','Software Engineering','Computer Organization & Architecture','Web Security'];
                  } else {
                    defaults[key] = ['UI/UX Design','Multimedia Systems','Cryptography','Introduction to Multimedia','Introduction to Cyber Security'];
                  }
                } else {
                  defaults[key] = [];
                }
              }
            }
          });
        });
      });

      // always overwrite stored lists with defaults to avoid stale data
      let existing = safeGetJSON(SUBJECTS_KEY, {});
      let changed = false;
      Object.keys(defaults).forEach(k => {
        if (!Array.isArray(existing[k]) || existing[k].join(',') !== defaults[k].join(',')) {
          existing[k] = defaults[k].slice();
          changed = true;
          console.log('initializeSubjects: set', k, '=>', defaults[k]);
        }
      });
      if (changed || !localStorage.getItem(SUBJECTS_KEY)) {
        localStorage.setItem(SUBJECTS_KEY, JSON.stringify(existing));
      }
    }

    // utility to clear all subjects (for debugging/starting fresh)
    function resetSubjects() {
      localStorage.removeItem(SUBJECTS_KEY);
      initializeSubjects();
      populateSubjects();
      alert('Curriculum reset to defaults');
    }

    function getSubjects() {
      initializeSubjects();
      return safeGetJSON(SUBJECTS_KEY, {});
    }

    function populateSubjects() {
      const sel = document.getElementById('subjects');
      sel.innerHTML = '';
      const semester = document.getElementById('semester').value;
      const section = document.getElementById('section').value;
      const year = document.getElementById('year').value;
      const classType = document.getElementById('classType').value;
      let key = semester + '_' + section + '_' + year;
      // for UG 3rd year, include specialization suffix
      if (classType === 'UG' && year === 'Y3') {
        const spec = document.getElementById('specialization').value;
        if (!spec) {
          // require specialization selection for Y3 UG
          sel.innerHTML = '<option value="">-- Select specialization --</option>';
          return;
        }
        key = key + '_' + spec;
      }
      console.debug('populateSubjects key', key);
      const subjects = getSubjects();
      let list = subjects[key] || [];
      // if UG Y3 specialization with built-in defaults and no list yet, seed automatically
      if (list.length === 0) {
        if (key.endsWith('_CYBER_SECURITY')) {
          const sem = semester;
          list = sem === 'ODD'
            ? ['Networking tools','Advanced Networking','Hacking Basics','Operating Systems','Secure Programming']
            : ['Cryptography','Web Security','Cyber Laws & Ethics','Ethical Hacking','Digital Forensics'];
        } else if (key.endsWith('_MULTIMEDIA')) {
          const sem = semester;
          list = sem === 'ODD'
            ? ['Introduction to Multimedia','Graphic Design Fundamentals','Digital Image Processing','Web Design & Development','2D Animation']
            : ['3D Animation Basics','Audio & Video Editing','UI/UX Design','Multimedia Systems','Digital Marketing Basics'];
        } else if (key.endsWith('_GENERAL')) {
          const sem = semester;
          list = sem === 'ODD'
            ? ['Web Technology','Computer Graphics','Software Engineering','Computer Organization & Architecture','Web Security']
            : ['UI/UX Design','Multimedia Systems','Cryptography','Introduction to Multimedia','Introduction to Cyber Security'];
        }
        if (list.length) {
          subjects[key] = list;
          localStorage.setItem(SUBJECTS_KEY, JSON.stringify(subjects));
          console.log('auto-seeded subjects for', key);
        }
      }
      if (!list.length) {
        console.warn('no subjects found for', key);
      }
      list.forEach(s => {
        const opt = document.createElement('option'); opt.value = s; opt.textContent = s; sel.appendChild(opt);
      });
    }

    function createDaysCheckboxes() {
      const container = document.getElementById('daysPrefs');
      const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      days.forEach(d => {
        const id = 'd_' + d;
        const wrapper = document.createElement('label');
        wrapper.style.display = 'flex'; wrapper.style.alignItems = 'center'; wrapper.style.gap = '6px';
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.id = id; cb.value = d;
        wrapper.appendChild(cb);
        const span = document.createElement('span'); span.textContent = d; wrapper.appendChild(span);
        container.appendChild(wrapper);
      });
    }

    document.getElementById('classType').addEventListener('change', () => {
      const type = document.getElementById('classType').value;
      const sectionSel = document.getElementById('section');
      if (type === 'UG') {
        sectionSel.innerHTML = '<option value="BCA_A">BCA A</option><option value="BCA_B">BCA B</option><option value="BCA_C">BCA C</option>';
        document.getElementById('year').style.display = 'block';
        document.getElementById('year').value = 'Y1'; // reset year to first by default when switching to UG
      } else {
        sectionSel.innerHTML = '<option value="MCA_A">MCA A</option><option value="MCA_B">MCA B</option>';
        document.getElementById('year').style.display = 'none';
      }
      // update specialization visibility
      const specRow = document.getElementById('specRow');
      if (document.getElementById('classType').value === 'UG' && document.getElementById('year').value === 'Y3') specRow.style.display = 'flex'; else specRow.style.display = 'none';
      populateSubjects();
    });
    document.getElementById('section').addEventListener('change', populateSubjects);
    document.getElementById('semester').addEventListener('change', populateSubjects);
    document.getElementById('year').addEventListener('change', () => {
      const specRow = document.getElementById('specRow');
      if (document.getElementById('classType').value === 'UG' && document.getElementById('year').value === 'Y3') specRow.style.display = 'flex'; else specRow.style.display = 'none';
      populateSubjects();
    });
    document.getElementById('specialization').addEventListener('change', populateSubjects);

    createDaysCheckboxes();
    populateSubjects();

    document.getElementById('teacherForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const classType = document.getElementById('classType').value;
      const section = document.getElementById('section').value;
      const year = document.getElementById('year').value;
      const semester = document.getElementById('semester').value;
      const hours = parseInt(document.getElementById('hours').value,10) || 0;
      const labCap = document.getElementById('labCap').value === 'yes';
      const subjectsSel = Array.from(document.getElementById('subjects').selectedOptions).map(o=>o.value);
      const days = Array.from(document.querySelectorAll('#daysPrefs input[type=checkbox]:checked')).map(i=>i.value);

      if (!name || subjectsSel.length===0) { alert('Please enter your name and at least one subject.'); return; }

      const entry = {name,email,classType,section,year,semester,hours,labCap,subjects:subjectsSel,days,submittedAt: new Date().toISOString()};

      const key = 'teachers_data';
      const existing = safeGetJSONNoWrite(key, []);
      existing.push(entry);
      localStorage.setItem(key, JSON.stringify(existing));

      alert('Submission saved locally. Admin can view/export the data.');
      this.reset();
      populateSubjects();
    });
  </script>
</body>
</html>
