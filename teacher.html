<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Teacher Login / Input</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;margin:0;padding:20px}
    .card{max-width:820px;margin:24px auto;padding:20px;background:white;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    h1{color:#333}label{display:block;margin:12px 0 6px;color:#333;font-weight:600}
    input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
    .row{display:flex;gap:12px}
    .half{flex:1}
    button{margin-top:16px;padding:10px 16px;border:0;border-radius:6px;background:#667eea;color:#fff;font-weight:700;cursor:pointer}
    .note{font-size:0.9rem;color:#666;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Teacher Submission</h1>
    <p class="note">Fill your teaching details and add all classes you teach</p>

    <form id="teacherForm">
      <label for="name">Full name</label>
      <input id="name" name="name" placeholder="e.g. Dr. A. Kumar" required />

      <label for="email">Email (optional)</label>
      <input id="email" name="email" type="email" placeholder="you@school.edu" />

      <label for="designation">Designation</label>
      <select id="designation" name="designation" required>
        <option value="">Select your designation</option>
        <option value="professor">Professor</option>
        <option value="professor (part time)">Professor (Part Time)</option>
        <option value="associate professor">Associate Professor</option>
        <option value="associate professor (part time)">Associate Professor (Part Time)</option>
        <option value="assistant professor (sc)">Assistant Professor (SC)</option>
        <option value="assistant professor (sc-part time)">Assistant Professor (SC-Part Time)</option>
        <option value="assistant professor (ss)">Assistant Professor (SS)</option>
        <option value="assistant professor (ss-part time)">Assistant Professor (SS-Part Time)</option>
      </select>
      <div id="workloadInfo" style="font-size:0.9rem;color:#666;margin-top:4px"></div>

      <label>Preferred days (optional)</label>
      <div id="daysPrefs" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
      </div>

      <h2 style="margin-top:24px;color:#333">Classes You Teach</h2>
      <p class="note">Add all the classes and subjects you teach. Click "Add more" to add another class.</p>

      <div id="classesContainer"></div>

      <button type="button" id="addClassBtn" style="margin-top:12px;background:#28a745">+ Add another class</button>

      <button type="submit" style="margin-top:16px">Submit</button>
      <p class="note">Data is stored locally in your browser (localStorage). Admin can export it.</p>
    </form>
  </div>

  <script>
    const SUBJECTS_KEY = 'curriculum_subjects';
    let classCardCount = 0;

    // Workload hours by designation
    const workloadHours = {
      'professor': 12,
      'professor (part time)': 8,
      'associate professor': 14,
      'associate professor (part time)': 9,
      'assistant professor (sc)': 16,
      'assistant professor (sc-part time)': 9,
      'assistant professor (ss)': 16,
      'assistant professor (ss-part time)': 9
    };

    function safeGetJSON(key, defaultVal) {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null || raw === undefined) return defaultVal;
        return JSON.parse(raw);
      } catch (err) {
        console.error('safeGetJSON parse error for', key, err);
        try { localStorage.setItem(key, JSON.stringify(defaultVal)); } catch (e) { }
        return defaultVal;
      }
    }

    function safeGetJSONNoWrite(key, defaultVal) {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null || raw === undefined) return defaultVal;
        return JSON.parse(raw);
      } catch (err) {
        console.error('safeGetJSONNoWrite parse error for', key, err);
        return defaultVal;
      }
    }

    function initializeSubjects() {
      const sections = {
        'ODD': ['BCA_A', 'BCA_B', 'BCA_C', 'MCA_A', 'MCA_B'],
        'EVEN': ['BCA_A', 'BCA_B', 'BCA_C', 'MCA_A', 'MCA_B']
      };
      const years = ['Y1','Y2','Y3'];
      const specsY3 = [
        { key: 'CYBER_SECURITY', label: 'Cyber Security' },
        { key: 'MULTIMEDIA', label: 'Multimedia' },
        { key: 'GENERAL', label: 'General' }
      ];

      const defaults = {};
      Object.keys(sections).forEach(sem => {
        sections[sem].forEach(sec => {
          years.forEach(y => {
            // Skip Y3 for MCA (only has 2 years)
            if (sec.startsWith('MCA') && y === 'Y3') {
              return;
            }
            
            if (y === 'Y3') {
              // Create specialization keys for year 3
              specsY3.forEach(s => {
                const key = sem + '_' + sec + '_' + y + '_' + s.key;
                if (s.key === 'CYBER_SECURITY') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Networking tools','Advanced Networking','Hacking Basics','Operating Systems','Secure Programming'];
                  } else {
                    defaults[key] = ['Cryptography','Web Security','Cyber Laws & Ethics','Ethical Hacking','Digital Forensics'];
                  }
                } else if (s.key === 'MULTIMEDIA') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Introduction to Multimedia','Graphic Design Fundamentals','Digital Image Processing','Web Design & Development','2D Animation'];
                  } else {
                    defaults[key] = ['3D Animation Basics','Audio & Video Editing','UI/UX Design','Multimedia Systems','Digital Marketing Basics'];
                  }
                } else if (s.key === 'GENERAL') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Web Technology','Computer Graphics','Software Engineering','Computer Organization & Architecture','Web Security'];
                  } else {
                    defaults[key] = ['UI/UX Design','Multimedia Systems','Cryptography','Introduction to Multimedia','Introduction to Cyber Security'];
                  }
                } else {
                  defaults[key] = [];
                }
              });
            } else {
              const key = sem + '_' + sec + '_' + y;
              if (sec.startsWith('MCA')) {
                if (y === 'Y1') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Statistics','Computer Networks','Python','Java','Advanced Data Structure','Accounts'];
                  } else {
                    defaults[key] = ['Machine Learning','Full Stack Development','Research Methodology','Software Design','Elective - Blockchain','Elective - Cloud Basics','Elective - Data Visualization','Nptel 1'];
                  }
                } else {
                  defaults[key] = ['Advanced Algorithms','Machine Learning','Distributed Systems','Artificial Intelligence'];
                }
              } else {
                if (y === 'Y1') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Statistics','Accounts','English','C','C++','Computer Concepts'];
                  } else {
                    defaults[key] = ['English','Communication','Web Designing','Python','Problem Solving Techniques'];
                  }
                } else if (y === 'Y2') {
                  if (sem === 'ODD') {
                    defaults[key] = ['Java','Advanced Python','Data Structure','Computer Networks','Nptel Course 1'];
                  } else {
                    defaults[key] = ['PHP','Enterprise Resource Management','Advanced Computer Networks','Database Management','Nptel Course 2'];
                  }
                }
              }
            }
          });
        });
      });

      let existing = safeGetJSON(SUBJECTS_KEY, {});
      let changed = false;
      Object.keys(defaults).forEach(k => {
        if (!Array.isArray(existing[k]) || existing[k].join(',') !== defaults[k].join(',')) {
          existing[k] = defaults[k].slice();
          changed = true;
        }
      });
      Object.keys(existing).forEach(k => {
        if (!(k in defaults)) {
          delete existing[k];
          changed = true;
        }
      });
      if (changed || !localStorage.getItem(SUBJECTS_KEY)) {
        localStorage.setItem(SUBJECTS_KEY, JSON.stringify(existing));
      }
    }

    function getSubjects() {
      initializeSubjects();
      return safeGetJSON(SUBJECTS_KEY, {});
    }

    function createDaysCheckboxes() {
      const container = document.getElementById('daysPrefs');
      const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      days.forEach(d => {
        const id = 'd_' + d;
        const wrapper = document.createElement('label');
        wrapper.style.display = 'flex'; wrapper.style.alignItems = 'center'; wrapper.style.gap = '6px';
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.id = id; cb.value = d;
        wrapper.appendChild(cb);
        const span = document.createElement('span'); span.textContent = d; wrapper.appendChild(span);
        container.appendChild(wrapper);
      });
    }

    // helper to get subjects for a specific class config
    function getSubjectsForClass(classType, section, year, semester, spec) {
      const subjects = getSubjects();
      let key = semester + '_' + section + '_' + year;
      if (classType === 'UG' && year === 'Y3' && spec) {
        key += '_' + spec;
      }
      return subjects[key] || [];
    }

    // Get assigned subjects for a specific class configuration (from OTHER teachers in localStorage)
    // Checks across all sections for the same year/semester combo
    function getAssignedSubjectsForClass(classType, year, semester, spec) {
      const teachersData = safeGetJSONNoWrite('teachers_data', []);
      const assignedSubjects = new Set();
      
      teachersData.forEach(teacher => {
        if (!teacher.classes) return;
        teacher.classes.forEach(cls => {
          if (cls.classType === classType && 
              cls.year === year && 
              cls.semester === semester &&
              (!spec || cls.specialization === spec)) {
            cls.subjects.forEach(subject => assignedSubjects.add(subject));
          }
        });
      });
      
      return assignedSubjects;
    }

    // Get subjects selected in current form by THIS teacher in other class cards
    function getSubjectsSelectedInOtherCards(excludeCardId, classType, year, semester, spec) {
      const selectedSubjects = new Set();
      const cards = document.querySelectorAll('[id^="classCard_"]');
      
      cards.forEach(card => {
        if (card.id === excludeCardId) return; // Skip the current card
        
        const cardClassType = card.querySelector('select[data-classtype]').value;
        const cardYear = card.querySelector('select[data-year]').value;
        const cardSemester = card.querySelector('select[data-semester]').value;
        const cardSpec = card.querySelector('select[data-spec]') ? card.querySelector('select[data-spec]').value : '';
        
        // Check if this card matches the year/semester combo (regardless of section)
        if (cardClassType === classType && 
            cardYear === year && 
            cardSemester === semester &&
            (!spec || cardSpec === spec)) {
          const subjects = Array.from(card.querySelector('select[data-subjects]').selectedOptions).map(o => o.value);
          subjects.forEach(s => selectedSubjects.add(s));
        }
      });
      
      return selectedSubjects;
    }

    // populate subject dropdown for a specific class card
    function populateSubjectsForCard(cardId) {
      const card = document.getElementById('classCard_' + cardId);
      if (!card) return;
      const sel = card.querySelector('select[data-subjects]');
      if (!sel) return;
      
      const classType = card.querySelector('select[data-classtype]').value;
      const section = card.querySelector('select[data-section]').value;
      const year = card.querySelector('select[data-year]').value;
      const semester = card.querySelector('select[data-semester]').value;
      const spec = card.querySelector('select[data-spec]') ? card.querySelector('select[data-spec]').value : '';
      
      sel.innerHTML = '';
      const allSubjects = getSubjectsForClass(classType, section, year, semester, spec);
      const assignedByOthers = getAssignedSubjectsForClass(classType, year, semester, spec);
      const assignedByThisTeacher = getSubjectsSelectedInOtherCards('classCard_' + cardId, classType, year, semester, spec);
      
      allSubjects.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        if (assignedByOthers.has(s)) {
          opt.textContent = s + ' (ASSIGNED TO ANOTHER TEACHER)';
          opt.disabled = true;
          opt.style.color = '#999';
        } else if (assignedByThisTeacher.has(s)) {
          opt.textContent = s + ' (YOU SELECTED IN ANOTHER CLASS)';
          opt.disabled = true;
          opt.style.color = '#999';
        } else {
          opt.textContent = s;
        }
        sel.appendChild(opt);
      });
    }

    // render a single class card
    function renderClassCard(cardId) {
      const container = document.getElementById('classesContainer');
      const card = document.createElement('div');
      card.id = 'classCard_' + cardId;
      card.style.border = '1px solid #ddd';
      card.style.borderRadius = '6px';
      card.style.padding = '12px';
      card.style.marginBottom = '12px';
      card.style.background = '#f9f9f9';
      
      const header = document.createElement('h3');
      header.style.margin = '0 0 12px';
      header.style.color = '#333';
      header.textContent = 'Class ' + cardId;
      card.appendChild(header);

      // row 1: class type, section
      const row1 = document.createElement('div');
      row1.className = 'row';
      row1.innerHTML = `
        <div class="half">
          <label>Class type</label>
          <select data-classtype required>
            <option value="UG">UG</option>
            <option value="PG">PG</option>
          </select>
        </div>
        <div class="half">
          <label>Section</label>
          <select data-section required>
            <option value="BCA_A">BCA A</option>
            <option value="BCA_B">BCA B</option>
            <option value="BCA_C">BCA C</option>
            <option value="MCA_A">MCA A</option>
            <option value="MCA_B">MCA B</option>
          </select>
        </div>
      `;
      card.appendChild(row1);

      // row 2: year, semester
      const row2 = document.createElement('div');
      row2.className = 'row';
      row2.innerHTML = `
        <div class="half">
          <label>Year</label>
          <select data-year required>
            <option value="Y1">1</option>
            <option value="Y2">2</option>
            <option value="Y3">3</option>
          </select>
        </div>
        <div class="half">
          <label>Semester</label>
          <select data-semester required>
            <option value="ODD">Odd</option>
            <option value="EVEN">Even</option>
          </select>
        </div>
      `;
      card.appendChild(row2);

      // row 3: specialization (hidden by default)
      const specRow = document.createElement('div');
      specRow.className = 'row';
      specRow.style.display = 'none';
      specRow.style.marginTop = '8px';
      specRow.innerHTML = `
        <div class="half">
          <label>Specialization (3rd year UG)</label>
          <select data-spec>
            <option value="">-- Select specialization --</option>
            <option value="CYBER_SECURITY">Cyber Security</option>
            <option value="MULTIMEDIA">Multimedia</option>
            <option value="GENERAL">General</option>
          </select>
        </div>
      `;
      card.appendChild(specRow);

      // row 4: hours, lab
      const row4 = document.createElement('div');
      row4.className = 'row';
      row4.innerHTML = `
        <div class="half">
          <label>Hours per week</label>
          <input type="number" data-hours min="1" max="40" value="10" required />
        </div>
        <div class="half">
          <label>Can take lab classes?</label>
          <select data-lab>
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
      `;
      card.appendChild(row4);

      // subjects selector
      const subjLabel = document.createElement('label');
      subjLabel.textContent = 'Select subjects (hold Ctrl/Cmd for multi-select)';
      card.appendChild(subjLabel);
      const subjSel = document.createElement('select');
      subjSel.setAttribute('data-subjects', 'true');
      subjSel.multiple = true;
      subjSel.size = 5;
      subjSel.required = true;
      
      // Add event listener to prevent selecting assigned subjects
      subjSel.addEventListener('change', function() {
        const selectedOptions = Array.from(this.selectedOptions);
        const classType = card.querySelector('select[data-classtype]').value;
        const year = card.querySelector('select[data-year]').value;
        const semester = card.querySelector('select[data-semester]').value;
        const spec = card.querySelector('select[data-spec]') ? card.querySelector('select[data-spec]').value : '';
        
        // Check subjects from other teachers (in localStorage)
        const assignedByOthers = getAssignedSubjectsForClass(classType, year, semester, spec);
        
        // Check subjects selected in OTHER cards in current form by THIS teacher
        const assignedByThisTeacher = getSubjectsSelectedInOtherCards(card.id, classType, year, semester, spec);
        
        for (let option of selectedOptions) {
          if (assignedByOthers.has(option.value)) {
            alert(`Subject "${option.value}" is already assigned to another teacher for ${classType} ${year} ${semester}. Please choose a different subject.`);
            option.selected = false;
            break;
          }
          if (assignedByThisTeacher.has(option.value)) {
            alert(`Subject "${option.value}" is already selected in another class for ${classType} ${year} ${semester}. Each subject can only be assigned once per semester. Please choose a different subject.`);
            option.selected = false;
            break;
          }
        }
      });
      
      card.appendChild(subjSel);

      // remove button
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.style.background = '#e74c3c';
      removeBtn.style.marginTop = '8px';
      removeBtn.textContent = 'Remove this class';
      removeBtn.onclick = () => removeClassCard(cardId);
      card.appendChild(removeBtn);

      container.appendChild(card);

      // attach event listeners for this card
      const classTypeSel = card.querySelector('select[data-classtype]');
      const sectionSel = card.querySelector('select[data-section]');
      const yearSel = card.querySelector('select[data-year]');
      const semesterSel = card.querySelector('select[data-semester]');
      const specSel = card.querySelector('select[data-spec]');

      const updateCard = () => {
        const ct = classTypeSel.value;
        if (ct === 'UG') {
          sectionSel.innerHTML = '<option value="BCA_A">BCA A</option><option value="BCA_B">BCA B</option><option value="BCA_C">BCA C</option>';
          yearSel.innerHTML = '<option value="Y1">1</option><option value="Y2">2</option><option value="Y3">3</option>';
          yearSel.value = 'Y1';
        } else {
          sectionSel.innerHTML = '<option value="MCA_A">MCA A</option><option value="MCA_B">MCA B</option>';
          yearSel.innerHTML = '<option value="Y1">1</option><option value="Y2">2</option>';
          yearSel.value = 'Y1';
        }
        // show/hide specialization
        if (ct === 'UG' && yearSel.value === 'Y3') {
          specRow.style.display = 'flex';
        } else {
          specRow.style.display = 'none';
        }
        populateSubjectsForCard(cardId);
      };

      classTypeSel.addEventListener('change', updateCard);
      sectionSel.addEventListener('change', () => populateSubjectsForCard(cardId));
      yearSel.addEventListener('change', () => {
        if (classTypeSel.value === 'UG' && yearSel.value === 'Y3') {
          specRow.style.display = 'flex';
        } else {
          specRow.style.display = 'none';
        }
        populateSubjectsForCard(cardId);
      });
      semesterSel.addEventListener('change', () => populateSubjectsForCard(cardId));
      specSel.addEventListener('change', () => populateSubjectsForCard(cardId));

      updateCard();
    }

    function addClassCard() {
      classCardCount++;
      renderClassCard(classCardCount);
    }

    function removeClassCard(cardId) {
      const card = document.getElementById('classCard_' + cardId);
      if (card) card.remove();
    }

    document.getElementById('addClassBtn').addEventListener('click', addClassCard);

    document.getElementById('teacherForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const designation = document.getElementById('designation').value.trim();
      const days = Array.from(document.querySelectorAll('#daysPrefs input[type=checkbox]:checked')).map(i=>i.value);

      if (!name) { alert('Please enter your name.'); return; }
      if (!designation) { alert('Please select your designation.'); return; }

      // Calculate total hours and check against workload
      const totalHours = calculateTotalHours();
      const teacherWorkload = workloadHours[designation] || 16;
      if (totalHours > teacherWorkload) {
        alert(`Total assigned hours (${totalHours}) exceed your workload limit (${teacherWorkload} hours). Please reduce your class assignments.`);
        return;
      }

      // collect all classes from cards
      const cards = document.querySelectorAll('[id^="classCard_"]');
      if (cards.length === 0) { alert('Please add at least one class.'); return; }

      // Check if at least one PG class is selected
      let hasPGClass = false;
      cards.forEach(card => {
        const classType = card.querySelector('select[data-classtype]').value;
        if (classType === 'PG') {
          hasPGClass = true;
        }
      });
      if (!hasPGClass) {
        alert('You must select at least one PG (MCA) class.');
        return;
      }

      const classes = [];
      let hasError = false;
      const allSelectedSubjects = new Map(); // classKey -> Set of subjects
      
      cards.forEach(card => {
        const classType = card.querySelector('select[data-classtype]').value;
        const section = card.querySelector('select[data-section]').value;
        const year = card.querySelector('select[data-year]').value;
        const semester = card.querySelector('select[data-semester]').value;
        const hours = parseInt(card.querySelector('input[data-hours]').value, 10) || 0;
        const labCap = card.querySelector('select[data-lab]').value === 'yes';
        const subjects = Array.from(card.querySelector('select[data-subjects]').selectedOptions).map(o => o.value);
        
        if (subjects.length === 0) {
          alert('Please select at least one subject for each class.');
          hasError = true;
          return;
        }

        // Check for duplicate subjects within this submission
        const classKey = `${classType}_${section}_${year}_${semester}`;
        if (!allSelectedSubjects.has(classKey)) {
          allSelectedSubjects.set(classKey, new Set());
        }
        const classSubjects = allSelectedSubjects.get(classKey);
        
        for (let subject of subjects) {
          if (classSubjects.has(subject)) {
            alert(`Subject "${subject}" is selected multiple times for the same class. Please select each subject only once.`);
            hasError = true;
            return;
          }
          classSubjects.add(subject);
        }

        let spec = '';
        if (classType === 'UG' && year === 'Y3') {
          spec = card.querySelector('select[data-spec]').value;
          if (!spec) {
            alert('Please select a specialization for Year 3 UG classes.');
            hasError = true;
            return;
          }
        }

        classes.push({ classType, section, year, semester, hours, labCap, subjects, specialization: spec });
      });

      if (hasError) return;

      const entry = { name, email, designation, classes, days, submittedAt: new Date().toISOString() };

      const key = 'teachers_data';
      const existing = safeGetJSONNoWrite(key, []);
      existing.push(entry);
      localStorage.setItem(key, JSON.stringify(existing));

      // Save to temporary storage for upload page
      localStorage.setItem('teacher_submission_temp', JSON.stringify(entry));

      alert('Submission saved! Now you will upload subject details.');
      // Redirect to upload page
      setTimeout(() => {
        window.location.href = 'upload-subjects.html';
      }, 300);
    });

    // initialize
    initializeSubjects();
    createDaysCheckboxes();
    addClassCard();

    // Add workload display functionality
    document.getElementById('designation').addEventListener('change', function() {
      const designation = this.value;
      const infoDiv = document.getElementById('workloadInfo');
      if (designation && workloadHours[designation]) {
        infoDiv.textContent = `Workload: ${workloadHours[designation]} hours per week`;
      } else {
        infoDiv.textContent = '';
      }
    });

    // Function to calculate total hours
    function calculateTotalHours() {
      const cards = document.querySelectorAll('[id^="classCard_"]');
      let totalHours = 0;
      cards.forEach(card => {
        const hours = parseInt(card.querySelector('input[data-hours]').value, 10) || 0;
        totalHours += hours;
      });
      return totalHours;
    }

    // Update total hours display
    function updateTotalHoursDisplay() {
      const totalHours = calculateTotalHours();
      const designation = document.getElementById('designation').value;
      const workload = workloadHours[designation] || 0;
      const infoDiv = document.getElementById('workloadInfo');
      if (designation) {
        infoDiv.textContent = `Workload: ${workload} hours per week | Current total: ${totalHours} hours`;
        if (totalHours > workload) {
          infoDiv.style.color = '#e74c3c';
          infoDiv.textContent += ' (EXCEEDS LIMIT!)';
        } else {
          infoDiv.style.color = '#666';
        }
      }
    }

    // Add event listeners to update total hours when hours change
    document.addEventListener('input', function(e) {
      if (e.target.matches('input[data-hours]')) {
        updateTotalHoursDisplay();
      }
    });

    // Update when classes are added/removed
    const originalAddClassCard = addClassCard;
    addClassCard = function() {
      originalAddClassCard();
      updateTotalHoursDisplay();
    };

    const originalRemoveClassCard = removeClassCard;
